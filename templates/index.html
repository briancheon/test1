<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="landing">
  <div class="card landing-card">
    <div class="logo">∑</div>
    <h1>Math Quiz</h1>
    <p class="subtitle">Test your maths skills across 10 questions</p>

    <div class="rules">
      <div class="rule">
        <span class="rule-icon correct-color">+10</span>
        <span>per correct answer</span>
      </div>
      <div class="rule">
        <span class="rule-icon wrong-color">−3</span>
        <span>per wrong answer</span>
      </div>
      <div class="rule">
        <span class="rule-icon">⏱</span>
        <span>60 second timer</span>
      </div>
    </div>

    <a href="/quiz" class="btn btn-primary">Start Quiz</a>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
